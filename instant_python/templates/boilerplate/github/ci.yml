name: Testing and Code analysis

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: {% raw %}${{ github.head_ref }}{% endraw %}

          fetch-depth: 0
          persist-credentials: false

      - name: 🛠️ Setup environment
        uses: ./.github/actions/python_setup

      - name: 🧐 Check linting
        run: make check-lint

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: {% raw %}${{ github.head_ref }}{% endraw %}

          fetch-depth: 0
          persist-credentials: false

      - name: 🛠️ Setup environment
        uses: ./.github/actions/python_setup

      - name: 🧐 Check code format
        run: make check-format

  typing:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: {% raw %}${{ github.head_ref }}{% endraw %}

          fetch-depth: 0
          persist-credentials: false

      - name: 🛠️ Setup environment
        uses: ./.github/actions/python_setup

      - name: 🧐 Check static types
        run: make check-typing

  analyze-code-quality:
    name: analyze-code-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: {% raw %}${{ github.head_ref }}{% endraw %}

          fetch-depth: 0
          persist-credentials: false

      - name: ▶️ CodeQL Initialization
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          build-mode: none
          queries: +security-extended,security-and-quality
      #          config-file: ./codeql-config.yml

      - name: 🧐 CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:python'

  {% if "precommit_hooks" in template.built_in_features %}
  secrets:
    name: secrets-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🛠️ Setup environment
        uses: ./.github/actions/python_setup

      - name: 🏃 Run secrets scanner
        run: make secrets
  {% endif %}

  audit:
    name: audit-dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🛠️ Setup environment
        uses: ./.github/actions/python_setup

      - name: 🏃 Run audit
        run: make audit

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📥 Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🛠️ Setup environment
        uses: ./.github/actions/python_setup

      - name: 📦 Install test dependencies
        run: {{ general.dependency_manager }} add pytest pytest-cov

      - name: 🏃 Run tests
        run: {{ general.dependency_manager }} run pytest --cov --cov-report=xml --cov-branch test -ra -s

      - name: 📥 Upload coverage report to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: coverage.xml
          flags: unittests
          name: codecov-coverage
          token: {% raw %}${{ secrets.CODECOV_TOKEN }}{% endraw %}

          slug: {{ git.username }}/{{ general.slug }}