- name: .github
  type: directory
  children:
    - name: dependabot
      type: file
      extension: .yml
      template: github/dependabot.yml
    - name: actions
      type: directory
      children:
        - name: python_setup
          type: directory
          children:
            - name: action
              type: file
              extension: .yml
              template: github/action.yml
    - name: workflows
      type: directory
      children:
        - name: ci
          type: file
          extension: .yml
          template: github/ci.yml
        - name: release
          type: file
          extension: .yml
          template: github/release.yml
      {% if ["custom_documentation"] | is_in(template.built_in_features) %}
        - name: documentation
          type: file
          extension: .yml
          template: github/pages.yml
      {% endif %}